<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blocked Page Replica</title>

<style>
:root{
  --bg:#dcdcdc;
  --panel:#f7f7f7;
  --red:#ea3d1d;
  --line:#e33a2b;
}
*{box-sizing:border-box}

body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background:var(--bg);
}

.topbar{background:#0c4f87;height:26px;}

.frame{
  width:min(740px, 100%);
  margin:auto;
  background:#fff;
  min-height:100vh;
  padding:10px 10px 30px;
}

/* 手机优化 */
@media (max-width:600px){
  h1{font-size:22px}
  .lead{font-size:14px}
}

.icon{
  width:70px;height:70px;margin:auto;display:block;
}

h1{text-align:center;color:var(--red);font-weight:800;}

.lead{
  text-align:center;
  font-size:15px;
  padding:0 12px;
}

.logos{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  margin:12px 0;
}

.seal{
  width:38px;height:38px;border-radius:50%;
  border:1px solid #ddd;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;
}

.panel{
  margin:auto;
  background:var(--panel);
  border-radius:12px;
  padding:16px;
}

.grid-wrap{
  border:1px solid var(--line);
  padding:12px;
  position:relative;
  background:#fff;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

/* 手机：2列 */
@media (max-width:600px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}

.item{text-align:center;font-size:13px;}

.card{
  width:100%;
  aspect-ratio:1;
  border-radius:12px;
  background:#f5f5f5;
  display:flex;align-items:center;justify-content:center;
}

.fake-logo{
  width:80%;
  height:80%;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:bold;
}

.ll{background:#f9a825}
.sp{background:#3d4674}
.ok{background:#7a2c83}
.cw{background:#d3b24a}
.mf{background:#2a84d7}
.dg{background:#cf2b20}
.bb{background:#c48d35}
.b88{background:#8b3fc9}
.hann{background:#b10f10}
.fw{background:#1e3f93}
.pat{background:#df3127}
.sg8{background:#dd274d}
.bingo{background:#16a34a}

.more{
  position:absolute;
  bottom:-16px;
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  padding:4px 10px;
  border-radius:8px;
  border:1px solid #ddd;
}

.footer-note{text-align:center;margin:20px 0;font-weight:bold;}
.copyright{text-align:center;color:#666;font-size:12px;}
</style>
</head>

<body>

<div class="topbar"></div>

<div class="frame">

<h1>ACCESS RESTRICTED</h1>

<p class="lead">
This website is <b>not licensed</b>. Users reported scams and lost money.
</p>

<div class="logos">
<div class="seal">DOJ</div>
<div class="seal">DICT</div>
<div class="seal">NBI</div>
<div class="seal">CICC</div>
<div class="seal">PAGCOR</div>
</div>

<div class="panel">
<div class="grid-wrap">
<div class="grid" id="grid"></div>
<div class="more">More ›</div>
</div>
</div>

<div class="footer-note">Keep the online space safe</div>
<div class="copyright">© 2026 CICC</div>

</div>

<script>
const sites = [
 {name:"789Bingo", cls:"bingo"},
 {name:"Legend Link", cls:"ll"},
 {name:"SportsPlus", cls:"sp"},
 {name:"Okada", cls:"ok"},
 {name:"CrazyWin", cls:"cw"},
 {name:"megaFUNalo", cls:"mf"},
 {name:"DeskGame", cls:"dg"},
 {name:"BigBunny", cls:"bb"},
 {name:"BET88", cls:"b88"},
 {name:"Hann Online", cls:"hann"},
 {name:"FASTWIN", cls:"fw"},
 {name:"PATOKBET", cls:"pat"},
 {name:"SG8 Casino", cls:"sg8"}
];

// ===== cookie工具 =====
function getCookie(name){
  return document.cookie.split('; ')
    .find(row => row.startsWith(name+'='))
    ?.split('=')[1];
}

function setCookie(name,value){
  document.cookie = name + "=" + value + "; path=/";
}

// ===== 随机 =====
function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

// ===== 核心逻辑 =====
let list;
const visited = getCookie("visited");

if(!visited){
  const bingo = sites[0];
  const others = sites.slice(1);
  list = [bingo, ...shuffle(others)];

  setCookie("visited","1");
}else{
  list = shuffle([...sites]);
}

// ===== 渲染 =====
const grid = document.getElementById("grid");

list.forEach(s=>{
  const div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
    <div class="card">
      <div class="fake-logo ${s.cls}">
        ${s.name === "789Bingo" ? "789" : s.name.split(" ")[0]}
      </div>
    </div>
    <a href="#">${s.name}</a>
  `;

  grid.appendChild(div);
});
</script>

</body>
</html>
